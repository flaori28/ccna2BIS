<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen CCNA 2 v7.0 - SRWE</title>
    <!-- Force refetch on deploy -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fas fa-network-wired"></i> CCNA 2 SRWE</h1>
                <p>Outil d'entraînement officiel</p>
            </div>
            <div class="header-stats" id="global-stats">
                <!-- Mini stats injected by JS -->
                <span>Chargement...</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            
            <!-- VIEW: Dashboard / Menu -->
            <section id="view-dashboard" class="active-view">
                <div class="welcome-box">
                    <h2>Tableau de Bord</h2>
                    <p>Sélectionnez une série pour commencer l'entraînement.</p>
                </div>
                
                <div class="stats-overview" id="stats-dashboard">
                    <!-- Detailed stats here -->
                </div>

                <div class="series-grid" id="series-list">
                    <!-- Series buttons generated by JS -->
                </div>
                
                <div class="debug-actions">
                     <button onclick="resetAllData()" class="btn-text-danger">Réinitialiser l'historique</button>
                </div>
            </section>

            <!-- VIEW: Quiz Interface -->
            <section id="view-quiz" class="hidden-view">
                <div class="quiz-header sticky">
                    <button class="btn-back" onclick="showDashboard()"><i class="fas fa-arrow-left"></i> Retour</button>
                    <h2 id="quiz-title">Série X</h2>
                    <div class="quiz-progress">
                        <span id="quiz-progress-text">0/0</span>
                    </div>
                </div>

                <form id="quiz-form">
                    <div id="questions-container">
                        <!-- Questions injected here -->
                    </div>

                    <div class="quiz-footer">
                        <button type="button" id="btn-validate" class="btn-primary-lg">Valider les réponses</button>
                    </div>
                </form>
            </section>

            <!-- VIEW: Results -->
            <section id="view-results" class="hidden-view">
                <div class="result-card">
                    <div class="score-circle" id="score-circle">
                        <span id="score-display">0%</span>
                    </div>
                    <h2 id="result-title">Résultats</h2>
                    <p id="result-message">Message</p>
                    
                    <div class="result-actions">
                         <button onclick="retryCurrentQuiz()" class="btn-secondary">Réessayer</button>
                         <button onclick="showDashboard()" class="btn-primary">Retour au Menu</button>
                    </div>
                </div>
            </section>

        </main>

        <footer class="app-footer">
            <p>&copy; 2026 - Site Web CCNA 2 (Refonte v3.0)</p>
        </footer>
    </div>

    <!-- Data & Logic -->
    <script src="data_final.js"></script>
    <script src="script_final.js"></script>
</body>
</html>
